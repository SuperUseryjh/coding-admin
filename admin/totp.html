<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA 验证码生成器 V4 | C++ Coding组</title>
    <link rel="icon" href="https://mr-onion-blog.fun/img/avatar.png" type="image/png">
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 设置全局字体为 Inter，并提供一个备用字体 */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* 浅灰色背景 */
        }
        /* 确保 SVG 进度条的动画平滑 */
        #timer-progress {
            /* 移除原有的 CSS transition，动画将由 JS 控制 */
        }
        /* 通知框的初始隐藏状态和过渡效果 */
        .notification-hidden {
            transform: translateY(-100%); /* 初始位置在顶部之外 */
            opacity: 0;
            visibility: hidden;
        }
        .notification-visible {
            transform: translateY(0); /* 显示时滑入 */
            opacity: 1;
            visibility: visible;
        }
        /* 添加颜色过渡，使颜色变化更平滑 */
        #timer-background, #timer-progress {
            transition: stroke 0.5s ease-in-out; /* 颜色过渡效果 */
        }
    </style>
</head>
<!-- 
    Body 标签现在设置为 flex 容器，并垂直排列其内容。
    min-h-screen 确保它至少占据整个视口高度。
    p-4 提供了整体内边距。
-->
<body class="flex flex-col min-h-screen p-4">

    <!-- 顶部通知框 -->
    <div id="notification-box" class="fixed top-0 left-1/2 -translate-x-1/2 transform transition-all duration-500 ease-out z-50
                                     bg-green-500 text-white p-4 rounded-b-lg shadow-lg flex items-center space-x-3
                                     notification-hidden">
        <!-- 勾选图标 (SVG) -->
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <span id="notification-message" class="text-lg font-semibold">验证码已更新</span>
    </div>

    <!-- 
        主内容区域容器：
        flex-grow 允许它占据所有可用空间，将页脚推到底部。
        flex items-center justify-center 用于将内部的卡片居中。
    -->
    <div class="flex-grow flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-6" id="main-title">请登录</h1>

            <!-- 登录表单 -->
            <div id="login-section">
                <input type="text" id="username-input" placeholder="输入您的用户名"
                       class="w-full p-3 mb-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="password-input" placeholder="输入您的密码"
                       class="w-full p-3 mb-6 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="login-btn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-blue-300">
                    登录
                </button>
                <p id="login-error-message" class="mt-4 text-red-600 hidden"></p>
            </div>

            <!-- 2FA 验证码显示区域 (登录后显示) -->
            <div id="totp-section" class="hidden">
                <!-- 圆环计时器区域 -->
                <div class="relative w-40 h-40 mx-auto mb-8">
                    <svg class="w-full h-full" viewBox="0 0 100 100">
                        <!-- 计时器背景圆环 -->
                        <circle id="timer-background" stroke-width="8" stroke="currentColor" fill="transparent" r="45" cx="50" cy="50"/>
                        <!-- 计时器进度圆环 -->
                        <circle id="timer-progress" stroke-width="8" stroke-dasharray="282.74 282.74" stroke-dashoffset="282.74" stroke-linecap="round" stroke="currentColor" fill="transparent" r="45" cx="50" cy="50" transform="rotate(-90 50 50)"/>
                    </svg>
                    <!-- 剩余时间显示 -->
                    <div id="countdown-display" class="absolute inset-0 flex items-center justify-center text-5xl font-bold text-gray-800">
                        30
                    </div>
                </div>

                <!-- 验证码显示和复制按钮区域 -->
                <div class="bg-gray-100 p-4 rounded-lg flex items-center justify-between mb-6">
                    <code id="otp-code-block" class="text-3xl font-mono text-gray-800 select-all">
                        ------
                    </code>
                    <button id="copy-btn" class="ml-4 bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-green-300">
                        复制
                    </button>
                </div>

                <!-- 手动更新验证码的按钮 -->
                <button id="generate-btn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-blue-300">
                    手动更新验证码
                </button>
                <button id="logout-btn"
                        class="w-full mt-4 bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-6 rounded-lg transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-red-300">
                    登出
                </button>
            </div>

            <!-- 加载消息和错误消息 -->
            <p id="loading-message" class="mt-4 text-gray-600 hidden">正在处理...</p>
            <p id="error-message" class="mt-4 text-red-600 hidden"></p>
        </div>
    </div>

    <!-- Developer Info Footer -->
    <footer class="mt-8 py-4 text-center text-gray-600 text-sm">
        <div class="container mx-auto">
            <p>开发者信息：Mr_Onion</p>
            <p>联系邮箱：admin@mr-onion-blog.fun</p>
            <p>开发者首页：<a href="https://mr-onion-blog.fun" target="_blank" class="text-blue-600 hover:underline">Mr_Onion's Blog</a></p>
            <p class="mt-2">&copy; 2025 C++ Coding组题目审核后台. All rights reserved.</p>
        </div>
    </footer>

    <script type="module">
        // 获取 DOM 元素的引用
        const mainTitle = document.getElementById('main-title');
        const loginSection = document.getElementById('login-section');
        const usernameInput = document.getElementById('username-input');
        const passwordInput = document.getElementById('password-input');
        const loginBtn = document.getElementById('login-btn');
        const loginErrorMessage = document.getElementById('login-error-message');

        const totpSection = document.getElementById('totp-section');
        const otpCodeBlock = document.getElementById('otp-code-block');
        const copyBtn = document.getElementById('copy-btn');
        const countdownDisplay = document.getElementById('countdown-display');
        const timerProgress = document.getElementById('timer-progress');
        const timerBackground = document.getElementById('timer-background');
        const generateBtn = document.getElementById('generate-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const loadingMessage = document.getElementById('loading-message');
        const errorMessage = document.getElementById('error-message');
        const notificationBox = document.getElementById('notification-box');
        const notificationMessage = document.getElementById('notification-message');

        // --- 配置 Cloudflare Worker URL ---
        // !!! 重要：请将此 URL 替换为您合并后的 Cloudflare Worker 的实际 URL。
        // !!! 例如：'https://your-auth-secret-worker-v2.your-username.workers.dev'
        // !!! 如果您在本地使用 `wrangler dev` 进行测试，它可能是 'http://localhost:8787'。
        // !!! 然而，为了避免混合内容错误，当您的 Worker 是 HTTPS 时，此 HTML 页面也必须通过 HTTPS 提供。
        // !!! 推荐使用 Cloudflare Pages 或本地 HTTPS 服务器 (例如 `wrangler pages dev --local-protocol https`) 来提供此 HTML。
        const AUTH_SECRET_WORKER_BASE_URL = 'https://coding-login.mr-onion-blog.fun'; // <-- 请替换此占位符！
        const LOGIN_API_URL = `${AUTH_SECRET_WORKER_BASE_URL}/api/login`;
        const LOGOUT_API_URL = `${AUTH_SECRET_WORKER_BASE_URL}/api/logout`; // 新增登出 API URL
        const VALIDATE_SESSION_API_URL = `${AUTH_SECRET_WORKER_BASE_URL}/api/validate-session`; // 新增会话验证 API URL


        // 全局变量
        let sessionToken = sessionStorage.getItem('sessionToken'); // 尝试从 sessionStorage 获取会话令牌
        let userTotpSecret = sessionStorage.getItem('userTotpSecret'); // 尝试从 sessionStorage 获取 2FA 秘密密钥
        let currentOtp = '------';
        let animationFrameId;
        let startTime;
        let initialTimeRemaining;
        
        const PERIOD = 30; // TOTP 的时间步长（秒），默认为 30 秒
        const SVG_CIRCLE_RADIUS = 45;
        const CIRCUMFERENCE = 2 * Math.PI * SVG_CIRCLE_RADIUS; // SVG 圆环的周长

        let isBlueTheme = false; // 用于跟踪当前是否为蓝色主题（蓝底灰进度条）

        // --- 辅助函数定义 ---

        /**
         * Base32 解码函数：将 Base32 字符串解码为 Uint8Array。
         */
        function base32Decode(base32String) {
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            let bits = '';
            let result = [];

            for (let i = 0; i < base32String.length; i++) {
                const char = base32String[i].toUpperCase();
                const val = alphabet.indexOf(char);
                if (val === -1) {
                    continue;
                }
                bits += val.toString(2).padStart(5, '0');
            }

            for (let i = 0; i + 8 <= bits.length; i += 8) {
                result.push(parseInt(bits.substring(i, i + 8), 2));
            }
            return new Uint8Array(result);
        }

        /**
         * 生成 TOTP 验证码的核心函数 (现在在前端本地计算)。
         */
        async function generateTotp(secretBase32, period = 30, digits = 6) {
            // 检查 Web Crypto API 可用性，这对于安全性至关重要
            if (!window.crypto || !window.crypto.subtle) {
                throw new Error("Web Crypto API (crypto.subtle) 不可用。请确保您在安全上下文 (HTTPS) 中运行，并使用支持此 API 的现代浏览器。");
            }

            const epoch = Math.floor(Date.now() / 1000);
            const timeStep = Math.floor(epoch / period);

            const timeStepBuffer = new ArrayBuffer(8);
            const timeStepView = new DataView(timeStepBuffer);
            timeStepView.setUint32(0, 0, false); // 高 32 位
            timeStepView.setUint32(4, timeStep, false); // 低 32 位

            const secretBytes = base32Decode(secretBase32);

            const key = await crypto.subtle.importKey(
                'raw', // 密钥格式为原始字节
                secretBytes, // 秘密密钥的字节数据
                { name: 'HMAC', hash: { name: 'SHA-1' } }, // 算法：HMAC-SHA1
                false, // 不可导出密钥
                ['sign'] // 密钥用途：签名
            );

            const hmac = await crypto.subtle.sign('HMAC', key, timeStepBuffer);
            const hmacBytes = new Uint8Array(hmac);

            const offset = hmacBytes[hmacBytes.length - 1] & 0x0F;

            const otp =
                ((hmacBytes[offset] & 0x7F) << 24) |
                ((hmacBytes[offset + 1] & 0xFF) << 16) |
                ((hmacBytes[offset + 2] & 0xFF) << 8) |
                (hmacBytes[offset + 3] & 0xFF);

            const finalOtp = otp % Math.pow(10, digits);
            return String(finalOtp).padStart(digits, '0');
        }

        /**
         * 显示顶部通知框。
         * @param {string} message - 要显示的通知消息。
         * @param {string} type - 通知类型 ('success' 或 'error')。
         */
        function showNotification(message, type = 'success') {
            notificationMessage.textContent = message;
            if (type === 'success') {
                notificationBox.classList.remove('bg-red-500');
                notificationBox.classList.add('bg-green-500');
            } else if (type === 'error') {
                notificationBox.classList.remove('bg-green-500');
                notificationBox.classList.add('bg-red-500');
            }
            notificationBox.classList.remove('notification-hidden');
            notificationBox.classList.add('notification-visible');
            setTimeout(() => {
                notificationBox.classList.remove('notification-visible');
                notificationBox.classList.add('notification-hidden');
            }, 2500);
        }

        /**
         * 更新圆环的颜色主题。
         * @param {boolean} isBlueThemeActive - 如果为 true，则应用蓝底灰进度条主题；否则应用灰底蓝进度条主题。
         */
        function applyTheme(isBlueThemeActive) {
            if (isBlueThemeActive) {
                timerBackground.classList.remove('text-gray-200');
                timerBackground.classList.add('text-blue-500');
                timerProgress.classList.remove('text-blue-500', 'text-white');
                timerProgress.classList.add('text-gray-200');
            } else {
                timerBackground.classList.remove('text-blue-500');
                timerBackground.classList.add('text-gray-200');
                timerProgress.classList.remove('text-gray-200', 'text-white');
                timerProgress.classList.add('text-blue-500');
            }
        }

        /**
         * 更新计时器显示（文本和 SVG 进度条）。
         * @param {number} timeMs - 剩余时间（毫秒）。
         */
        function updateTimerDisplay(timeMs) {
            const currentSeconds = Math.max(0, Math.ceil(timeMs / 1000));
            countdownDisplay.textContent = currentSeconds;
            const progressRatio = timeMs / (PERIOD * 1000);
            const dashoffset = CIRCUMFERENCE * progressRatio;
            timerProgress.style.strokeDashoffset = dashoffset;
        }

        /**
         * 驱动计时器动画的函数，由 requestAnimationFrame 调用。
         * @param {DOMHighResTimeStamp} currentTime - 当前时间戳。
         */
        function animateTimer(currentTime) {
            const elapsedTime = currentTime - startTime;
            const remainingTimeMs = initialTimeRemaining * 1000 - elapsedTime;
            
            updateTimerDisplay(remainingTimeMs);

            if (remainingTimeMs > 0) {
                animationFrameId = requestAnimationFrame(animateTimer);
            } else {
                updateOtpAndTimer(); // 计时结束，更新 OTP
            }
        }

        /**
         * 启动倒计时计时器。
         */
        function startCountdown() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            const epoch = Math.floor(Date.now() / 1000);
            initialTimeRemaining = PERIOD - (epoch % PERIOD);
            startTime = performance.now();
            animationFrameId = requestAnimationFrame(animateTimer);
        }
        
        /**
         * 在本地生成 OTP 并启动/重启计时器。
         */
        async function updateOtpAndTimer() {
            loadingMessage.classList.remove('hidden');
            errorMessage.classList.add('hidden');
            generateBtn.disabled = true;
            logoutBtn.disabled = true;

            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }

            try {
                // 切换主题状态
                isBlueTheme = !isBlueTheme;
                applyTheme(isBlueTheme);

                // 确保秘密密钥可用
                if (!userTotpSecret) {
                    // 如果由于某种原因（例如会话过期，但页面未刷新）本地没有密钥，则尝试重新登录或提示错误
                    throw new Error('本地未找到 2FA 秘密密钥，请重新登录。');
                }

                // 使用获取到的密钥在本地生成 TOTP
                currentOtp = await generateTotp(userTotpSecret, PERIOD, 6);
                otpCodeBlock.textContent = currentOtp;
                startCountdown();
                showNotification('验证码已更新', 'success');

            } catch (error) {
                console.error('生成验证码失败:', error);
                errorMessage.textContent = `生成验证码失败: ${error.message}`;
                errorMessage.classList.remove('hidden');
                otpCodeBlock.textContent = '错误';
                countdownDisplay.textContent = '--';
                showNotification(`验证码更新失败: ${error.message}`, 'error');
                
                if (error.message.includes('Unauthorized') || error.message.includes('Invalid credentials') || error.message.includes('会话已过期或无效') || error.message.includes('本地未找到')) {
                    showNotification('会话已过期或无效，请重新登录。', 'error');
                    logout();
                }

            } finally {
                loadingMessage.classList.add('hidden');
                generateBtn.disabled = false;
                logoutBtn.disabled = false;
            }
        }

        /**
         * 处理登录逻辑。
         */
        async function handleLogin() {
            const username = usernameInput.value;
            const password = passwordInput.value;

            loginBtn.disabled = true;
            loadingMessage.classList.remove('hidden');
            loginErrorMessage.classList.add('hidden');

            // --- 重要：检查前端是否通过 HTTPS 提供服务 ---
            if (window.location.protocol !== 'https:' && AUTH_SECRET_WORKER_BASE_URL.startsWith('https://')) {
                loginErrorMessage.textContent = '安全错误：此页面必须通过 HTTPS 提供服务才能与 Cloudflare Worker 通信。';
                loginErrorMessage.classList.remove('hidden');
                loginBtn.disabled = false;
                loadingMessage.classList.add('hidden');
                console.error('混合内容阻止：前端是 HTTP/file，Worker 是 HTTPS。请通过 HTTPS 提供此 HTML。');
                return; // 如果不安全，则停止执行
            }


            try {
                const response = await fetch(LOGIN_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                // 检查 HTTP 响应状态码
                if (!response.ok) {
                    let errorDetails = '未知错误';
                    try {
                        // 尝试解析 JSON 错误响应
                        const errorData = await response.json();
                        errorDetails = errorData.message || errorData.details || `HTTP 状态码: ${response.status}`;
                    } catch (e) {
                        // 如果响应不是 JSON，则尝试获取文本或使用通用消息
                        errorDetails = await response.text() || `HTTP 状态码: ${response.status} (非 JSON 响应)`;
                    }
                    throw new Error(errorDetails);
                }

                // 尝试解析 JSON 响应
                const data = await response.json();
                
                // 检查响应数据结构是否包含 sessionToken 和 totpSecret
                if (!data.sessionToken || !data.totpSecret) {
                    throw new Error('登录响应中缺少会话令牌或 2FA 秘密密钥。');
                }

                sessionToken = data.sessionToken;
                userTotpSecret = data.totpSecret; // <-- 直接从登录响应中获取密钥
                
                sessionStorage.setItem('sessionToken', sessionToken);
                sessionStorage.setItem('userTotpSecret', userTotpSecret); // <-- 存储密钥

                // 登录成功，切换到 2FA 界面
                show2FaSection();

            } catch (error) {
                console.error('登录失败:', error);
                loginErrorMessage.textContent = `登录失败: ${error.message}`;
                loginErrorMessage.classList.remove('hidden');
            } finally {
                loginBtn.disabled = false;
                loadingMessage.classList.add('hidden');
            }
        }

        /**
         * 切换到 2FA 显示区域。
         */
        function show2FaSection() {
            mainTitle.textContent = '2FA 验证码';
            loginSection.classList.add('hidden');
            totpSection.classList.remove('hidden');
            // 登录成功后立即获取并显示验证码
            updateOtpAndTimer();
        }

        /**
         * 登出功能。
         */
        async function logout() { // 改为 async 函数，因为要发送网络请求
            if (sessionToken) {
                try {
                    // 向后端发送登出请求，使服务器端会话失效
                    const response = await fetch(LOGOUT_API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${sessionToken}` // 在 Authorization 头中发送令牌
                        }
                        // 如果需要在请求体中发送令牌，则可以使用 body: JSON.stringify({ sessionToken })
                    });

                    if (!response.ok) {
                        console.warn('后端登出请求失败，但将清除本地会话。', await response.text());
                    }
                } catch (error) {
                    console.error('发送登出请求时发生错误:', error);
                }
            }

            // 无论后端请求是否成功，都清除本地会话
            sessionToken = null;
            userTotpSecret = null; // 清除本地存储的 2FA 秘密密钥
            sessionStorage.removeItem('sessionToken');
            sessionStorage.removeItem('userTotpSecret');
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            mainTitle.textContent = '请登录';
            loginSection.classList.remove('hidden');
            totpSection.classList.add('hidden');
            usernameInput.value = '';
            passwordInput.value = '';
            otpCodeBlock.textContent = '------';
            countdownDisplay.textContent = '--';
            applyTheme(false);
        }

        /**
         * 检查并验证现有会话。
         */
        async function checkAndValidateSession() {
            if (sessionToken && userTotpSecret) {
                try {
                    const response = await fetch(VALIDATE_SESSION_API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${sessionToken}` // 在 Authorization 头中发送令牌
                        }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        // 理论上这里不需要重新设置 userTotpSecret，因为前端已经有。
                        // 但如果 /validate-session 返回了，可以在这里更新，以防万一。
                        userTotpSecret = data.totpSecret; 
                        show2FaSection();
                    } else {
                        // 会话无效或过期，清除本地存储并回到登录界面
                        console.log('会话验证失败或已过期，请重新登录。');
                        logout(); // 自动执行登出操作
                    }
                } catch (error) {
                    console.error('验证会话时发生网络或解析错误:', error);
                    logout(); // 发生错误也自动登出
                }
            } else {
                applyTheme(isBlueTheme); // 没有会话，保持登录界面主题
            }
        }

        // --- 事件监听器 ---

        loginBtn.addEventListener('click', handleLogin);
        generateBtn.addEventListener('click', updateOtpAndTimer);
        logoutBtn.addEventListener('click', logout);

        copyBtn.addEventListener('click', () => {
            const tempInput = document.createElement('textarea');
            tempInput.value = currentOtp;
            document.body.appendChild(tempInput);
            tempInput.select();
            try {
                document.execCommand('copy');
                copyBtn.textContent = '已复制!';
                setTimeout(() => {
                    copyBtn.textContent = '复制';
                }, 1500);
            } catch (err) {
                console.error('复制失败:', err);
                copyBtn.textContent = '复制失败';
                setTimeout(() => {
                    copyBtn.textContent = '复制';
                }, 1500);
            }
            document.body.removeChild(tempInput);
        });

        // 页面加载时检查是否存在会话令牌，如果存在则直接进入 2FA 界面
        document.addEventListener('DOMContentLoaded', () => {
            checkAndValidateSession(); // 调用新的会话验证函数
        });
    </script>
</body>
</html>
